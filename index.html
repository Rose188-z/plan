<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>日计划</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#4CAF50;--gl:#E8F5E9;--gr:#9E9E9E;--grl:#F5F5F5;--t:#212121;--ts:#757575;--bd:#E0E0E0;--bg:#FAFAFA;--w:#FFF;--r:#EF5350;--bl:#E3F2FD;--b:#1976D2;--o:#FF9800;--ol:#FFF3E0;--purple:#9C27B0;--pl:#F3E5F5}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}
.page{display:none;min-height:100vh;padding-bottom:80px}
.page.active{display:block}
.sub-page{display:none;min-height:100vh;padding-bottom:80px}
.sub-page.active{display:block}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--bd);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;background:none;border:none;color:var(--gr);cursor:pointer;gap:3px}
.nav-item.active{color:var(--g)}
.nav-icon{font-size:22px}
.nav-label{font-size:11px}

/* 日历 */
.cal-nav{display:flex;align-items:center;justify-content:center;gap:20px;padding:16px 20px 8px}
.cal-nav button{background:none;border:none;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;color:var(--ts)}
.cal-nav .ml{font-size:18px;font-weight:700;min-width:140px;text-align:center}
.wr{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:8px 12px 4px}
.wr span{font-size:12px;color:var(--ts);padding:8px 0}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 12px 12px}
.dc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--t);transition:all .2s}
.dc.empty{cursor:default}
.dc.today{font-weight:700;box-shadow:inset 0 0 0 2px var(--g)}
.dc.completed{background:var(--g);color:#fff;font-weight:700}
.dc.has-tasks{background:var(--gl)}
.dc.future{color:#BDBDBD}
.mstats{margin:0 20px 12px;padding:14px;background:var(--w);border-radius:16px;display:flex;justify-content:space-around;text-align:center;border:1px solid var(--bd)}
.sn{font-size:22px;font-weight:700;color:var(--g)}
.sl{font-size:11px;color:var(--ts);margin-top:2px}

/* 月度计划 */
.month-plan{margin:0 20px 20px;padding:16px;background:var(--w);border-radius:16px;border:1px solid var(--bd)}
.month-plan-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--t)}
.mp-item{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mp-dot{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0}
.mp-text{flex:1;font-size:14px;padding:8px 0;border:none;border-bottom:1px solid var(--bd);background:none;outline:none;color:var(--t)}
.mp-text:focus{border-bottom-color:var(--g)}
.mp-text::placeholder{color:#BDBDBD}
.mp-del{background:none;border:none;color:var(--gr);font-size:16px;cursor:pointer;padding:4px;opacity:.4}
.mp-add{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;margin-top:4px;border:1px dashed var(--bd);border-radius:10px;color:var(--ts);font-size:13px;cursor:pointer;background:none;width:100%}
.mp-add:active{background:var(--grl)}

/* 猫咪桌宠 */
.cat-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 20px 8px;position:relative}
.cat-container{position:relative;width:64px;height:64px;cursor:pointer}
.cat-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:48px;line-height:1;transition:transform .3s}
.cat-bubble{position:absolute;top:-8px;left:70px;background:var(--w);border:1px solid var(--bd);border-radius:12px;padding:4px 10px;font-size:12px;color:var(--t);white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.08);animation:bubbleIn .4s ease}
.cat-bubble::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:var(--bd)}
.cat-bubble::after{content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--w)}
@keyframes bubbleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes catWave{0%,100%{transform:translateX(-50%) rotate(0deg)}25%{transform:translateX(-50%) rotate(-10deg)}75%{transform:translateX(-50%) rotate(10deg)}}
@keyframes catSleep{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(3px)}}
@keyframes catType{0%,100%{transform:translateX(-50%) translateY(0)}25%{transform:translateX(-50%) translateY(-2px)}75%{transform:translateX(-50%) translateY(-2px) rotate(2deg)}}
@keyframes catJump{0%,100%{transform:translateX(-50%) translateY(0)}30%{transform:translateX(-50%) translateY(-16px) scale(1.1)}60%{transform:translateX(-50%) translateY(-8px)}}
@keyframes catMeow{0%{transform:translateX(-50%) scale(1)}15%{transform:translateX(-50%) scale(1.15)}30%{transform:translateX(-50%) scale(1)}60%{transform:translateX(-50%) rotate(8deg)}100%{transform:translateX(-50%) rotate(0deg)}}
.cat-wave .cat-body{animation:catWave 1s ease-in-out infinite}
.cat-sleep .cat-body{animation:catSleep 2s ease-in-out infinite}
.cat-type .cat-body{animation:catType .4s ease-in-out infinite}
.cat-jump .cat-body{animation:catJump .6s ease-in-out 3}
.cat-meow .cat-body{animation:catMeow .6s ease-in-out 1}

/* 今日页 */
.di{padding:8px 20px 6px}
.di .dt{font-size:13px;color:var(--ts)}
.di .dd{font-size:20px;font-weight:700;margin-top:2px}
.pw{padding:0 20px 4px}
.pbg{background:var(--grl);border-radius:100px;height:6px;overflow:hidden}
.pf{height:100%;background:var(--g);border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0}
.pt{text-align:right;padding:2px 20px 8px;font-size:12px;color:var(--ts)}
.sl2{padding:6px 20px;font-size:11px;font-weight:700;color:var(--ts);letter-spacing:1px}
.tl{padding:0 16px}
.ti{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--w);border-radius:12px;margin-bottom:6px;border:1px solid var(--bd);animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ti.done{opacity:.5}
.ti.done .tt{text-decoration:line-through;color:var(--ts)}
.cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:none;transition:all .3s}
.cb.checked{border-color:var(--g);background:var(--g);animation:pp .4s cubic-bezier(.4,0,.2,1)}
@keyframes pp{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
.cb.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.tt{flex:1;font-size:15px;line-height:1.3}
.tg{font-size:9px;padding:2px 6px;border-radius:100px;font-weight:600;flex-shrink:0}
.tg.fixed{background:var(--gl);color:var(--g)}
.tg.flex{background:var(--bl);color:var(--b)}
.tg.carry{background:var(--pl);color:var(--purple)}
.td{background:none;border:none;color:var(--gr);font-size:16px;cursor:pointer;padding:4px;opacity:.4}
.aa{padding:10px 16px 30px}
.ar{display:flex;gap:8px}
.ai{flex:1;padding:12px 16px;border:1px solid var(--bd);border-radius:12px;font-size:14px;background:var(--w);outline:none}
.ai:focus{border-color:var(--g)}
.ab{padding:12px 18px;background:var(--g);color:#fff;border:none;border-radius:12px;font-size:20px;cursor:pointer}

/* Other页 */
.other-list{padding:16px 20px}
.other-card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--w);border-radius:16px;margin-bottom:10px;border:1px solid var(--bd);cursor:pointer;transition:all .2s}
.other-card:active{transform:scale(0.98);background:var(--grl)}
.oc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.oc-icon.green{background:var(--gl)}
.oc-icon.blue{background:var(--bl)}
.oc-icon.orange{background:var(--ol)}
.oc-info{flex:1}
.oc-title{font-size:16px;font-weight:600}
.oc-desc{font-size:12px;color:var(--ts);margin-top:2px}
.oc-arrow{color:var(--gr);font-size:18px}

/* 子页面 */
.sub-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--w);position:sticky;top:0;z-index:100}
.sub-back{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:var(--t)}
.sub-title{font-size:18px;font-weight:700}
.ri{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--w);border-radius:14px;margin:0 20px 8px;border:1px solid var(--bd);animation:si .3s ease}
.ric{width:36px;height:36px;background:var(--gl);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.rit{flex:1;font-size:16px}
.rid{background:none;border:none;color:var(--gr);font-size:18px;cursor:pointer;padding:4px;opacity:.4}

/* 灵感 */
.idea-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--w);border-radius:14px;margin:0 20px 8px;border:1px solid var(--bd);cursor:pointer;transition:all .2s}
.idea-item:active{background:var(--grl)}
.idea-dot{width:10px;height:10px;border-radius:50%;background:var(--b);flex-shrink:0}
.idea-title{flex:1;font-size:15px;font-weight:500}
.idea-time{font-size:11px;color:var(--ts)}
.idea-arrow{color:var(--gr);font-size:16px}
.idea-edit-title{width:100%;padding:16px 20px;border:none;border-bottom:1px solid var(--bd);font-size:18px;font-weight:600;outline:none;background:var(--w)}
.idea-edit-title:focus{border-bottom-color:var(--g)}
.idea-edit-body{width:100%;padding:16px 20px;border:none;font-size:15px;line-height:1.8;outline:none;
min-height:300px;background:var(--bg);resize:none}
.idea-del-btn{margin:20px;padding:14px;background:none;border:1px solid var(--r);color:var(--r);border-radius:12px;font-size:15px;width:calc(100% - 40px);cursor:pointer}

/* 早睡打卡 */
.sleep-card{margin:20px;padding:24px;background:var(--w);border-radius:20px;border:1px solid var(--bd);text-align:center}
.sleep-emoji{font-size:60px;margin-bottom:12px}
.sleep-streak{font-size:20px;font-weight:700;margin-bottom:4px}
.sleep-sub{font-size:13px;color:var(--ts);margin-bottom:20px}
.sleep-btn{padding:14px 40px;border:none;border-radius:100px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.sleep-btn.can-check{background:var(--g);color:#fff}
.sleep-btn.can-check:active{transform:scale(0.95)}
.sleep-btn.checked{background:var(--gl);color:var(--g)}
.sleep-cal{margin:0 20px 20px;padding:16px;background:var(--w);border-radius:16px;border:1px solid var(--bd)}
.sleep-cal-title{font-size:14px;font-weight:600;margin-bottom:12px;text-align:center}
.sleep-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.sleep-grid .wk{font-size:11px;color:var(--ts);padding:4px 0}
.sleep-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px}
.sleep-day.checked-day{background:var(--gl);color:var(--g);font-weight:700}
.sleep-day.missed{color:#BDBDBD}
.sleep-day.today-s{box-shadow:inset 0 0 0 1.5px var(--g)}

/* 空状态 */
.es{text-align:center;padding:40px 20px;color:var(--ts)}
.es .ei{font-size:48px;margin-bottom:12px}
.es p{font-size:14px;line-height:1.6}

/* 庆祝 */
.conf{position:fixed;width:10px;height:10px;z-index:10000;border-radius:2px;pointer-events:none}
.co{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
.co.show{opacity:1}
.ct{font-size:28px;font-weight:700;color:var(--g);text-align:center;line-height:1.6;animation:cp .6s ease}
@keyframes cp{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<!-- ===== 日历页 ===== -->
<div class="page" id="page-cal">
<div class="cal-nav">
<button onclick="changeMonth(-1)">◀</button>
<span class="ml" id="monthLabel"></span>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="wr">
<span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
</div>
<div class="dg" id="daysGrid"></div>
<div class="mstats">
<div><div class="sn" id="statDone">0</div><div class="sl">完成天数</div></div>
<div><div class="sn" id="statTotal">0</div><div class="sl">有计划天数</div></div>
<div><div class="sn" id="statRate">0%</div><div class="sl">完成率</div></div>
</div>
<div class="month-plan">
<div class="month-plan-title">📝 本月计划</div>
<div id="monthPlanList"></div>
<button class="mp-add" id="mpAddBtn" onclick="addMonthPlan()">+ 添加计划</button>
</div>
</div>

<!-- ===== 今日页 ===== -->
<div class="page active" id="page-today">
<div class="cat-wrap">
<div class="cat-container" id="catContainer" onclick="catMeow()">
<div class="cat-body" id="catBody">🐱</div>
</div>
<div class="cat-bubble" id="catBubble">早上好</div>
</div>
<div class="di">
<div class="dt" id="todayDate"></div>
<div class="dd" id="todayTitle"></div>
</div>
<div class="pw"><div class="pbg"><div class="pf" id="progressBar"></div></div></div>
<div class="pt" id="progressText">0 / 0 已完成</div>
<div id="carrySection" style="display:none">
<div class="sl2">⏰ 遗留未完成</div>
<div class="tl" id="carryList"></div>
</div>
<div id="fixedSection">
<div class="sl2">📌 每日固定</div>
<div class="tl" id="fixedList"></div>
</div>
<div id="flexSection">
<div class="sl2">✏️ 今日新增</div>
<div class="tl" id="flexList"></div>
</div>
<div class="aa">
<div class="ar">
<input class="ai" id="newTask" type="text" placeholder="添加今日计划..."
  onkeydown="if(event.key==='Enter')addFlexTask()">
<button class="ab" onclick="addFlexTask()">+</button>
</div>
</div>
</div>

<!-- ===== Other页 ===== -->
<div class="page" id="page-other">
<div style="padding:20px 20px 8px;font-size:20px;font-weight:700;">Other</div>
<div class="other-list">
<div class="other-card" onclick="openSub('routine')">
<div class="oc-icon green">📌</div>
<div class="oc-info"><div class="oc-title">固定事项</div><div class="oc-desc">管理每日自动出现的计划</div></div>
<div class="oc-arrow">›</div>
</div>
<div class="other-card" onclick="openSub('ideas')">
<div class="oc-icon blue">💡</div>
<div class="oc-info"><div class="oc-title">灵感</div><div class="oc-desc">随时记录你的想法</div></div>
<div class="oc-arrow">›</div>
</div>
<div class="other-card" onclick="openSub('sleep')">
<div class="oc-icon orange">🌙</div>
<div class="oc-info"><div class="oc-title">早睡打卡</div><div class="oc-desc">23:30 熄灯，坚持早睡</div></div>
<div class="oc-arrow">›</div>
</div>
</div>
</div>

<!-- ===== 子页面：固定事项 ===== -->
<div class="sub-page" id="sub-routine">
<div class="sub-header">
<button class="sub-back" onclick="closeSub()">←</button>
<div class="sub-title">固定事项</div>
</div>
<div style="padding:8px 20px 12px;font-size:13px;color:var(--ts);line-height:1.5;">添加后会每天自动出现在今日计划中</div>
<div id="routineList"></div>
<div id="routineEmpty" class="es" style="display:none">
<div class="ei">📝</div>
<p>还没有固定项目<br>添加后每天自动出现</p>
</div>
<div class="aa">
<div class="ar">
<input class="ai" id="newRoutine" type="text" placeholder="添加固定项目..."
  onkeydown="if(event.key==='Enter')addRoutine()">
<button class="ab" onclick="addRoutine()">+</button>
</div>
</div>
</div>

<!-- ===== 子页面：灵感列表 ===== -->
<div class="sub-page" id="sub-ideas">
<div class="sub-header">
<button class="sub-back" onclick="closeSub()">←</button>
<div class="sub-title">灵感</div>
<button style="margin-left:auto;background:var(--g);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:14px;cursor:pointer" onclick="newIdea()">+ 新增</button>
</div>
<div id="ideaList" style="padding-top:8px"></div>
<div id="ideaEmpty" class="es">
<div class="ei">💡</div>
<p>还没有灵感<br>点右上角新增一条吧</p>
</div>
</div>

<!-- ===== 子页面：灵感编辑 ===== -->
<div class="sub-page" id="sub-idea-edit">
<div class="sub-header">
<button class="sub-back" onclick="saveAndBackIdea()">←</button>
<div class="sub-title">编辑灵感</div>
</div>
<input class="idea-edit-title" id="ideaEditTitle" placeholder="灵感标题...">
<textarea class="idea-edit-body" id="ideaEditBody" placeholder="写下你的想法..."></textarea>
<button class="idea-del-btn" id="ideaDelBtn" onclick="deleteIdea()">删除这条灵感</button>
</div>

<!-- ===== 子页面：早睡打卡 ===== -->
<div class="sub-page" id="sub-sleep">
<div class="sub-header">
<button class="sub-back" onclick="closeSub()">←</button>
<div class="sub-title">早睡打卡</div>
</div>
<div class="sleep-card">
<div class="sleep-emoji" id="sleepEmoji">🌙</div>
<div class="sleep-streak" id="sleepStreak">已连续早睡 0 天</div>
<div class="sleep-sub">目标：23:30 熄灯</div>
<button class="sleep-btn can-check" id="sleepBtn" onclick="doSleepCheck()">今日打卡 🌙</button>
</div>
<div class="sleep-cal">
<div class="sleep-cal-title" id="sleepCalTitle">本月打卡记录</div>
<div class="sleep-grid" id="sleepGrid"></div>
</div>
</div>

<!-- ===== 庆祝弹层 ===== -->
<div class="co" id="celebOverlay">
<div class="ct" id="celebText"></div>
</div>

<!-- ===== 底部导航 ===== -->
<div class="bottom-nav">
<button class="nav-item" onclick="switchPage('cal')">
<span class="nav-icon">📅</span>
<span class="nav-label">日历</span>
</button>
<button class="nav-item active" onclick="switchPage('today')">
<span class="nav-icon">📋</span>
<span class="nav-label">今日</span>
</button>
<button class="nav-item" onclick="switchPage('other')">
<span class="nav-icon">💡</span>
<span class="nav-label">Other</span>
</button>
</div>
<script>
// ===== 数据管理 =====
function load(key, def) {
  try { var d = localStorage.getItem(key); return d ? JSON.parse(d) : def; }
  catch(e) { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getRoutines() { return load('routines', []); }
function saveRoutines(r) { save('routines', r); }

// 某天数据: {fixed:{id:bool}, flex:[{id,text,done}], carry:[{id,text,done,from}], removedFixed:[id]}
function getDayData(dateStr) { return load('day_' + dateStr, null); }
function saveDayData(dateStr, data) { save('day_' + dateStr, data); }

// 月度计划: [{id, text}]
function getMonthPlan(yearMonth) { return load('mp_' + yearMonth, []); }
function saveMonthPlan(yearMonth, data) { save('mp_' + yearMonth, data); }

// 灵感: [{id, title, body, time}]
function getIdeas() { return load('ideas', []); }
function saveIdeas(list) { save('ideas', list); }

// 早睡打卡: {dates: ['2026-07-21', ...]}
function getSleepData() { return load('sleep', {dates:[]}); }
function saveSleepData(d) { save('sleep', d); }

// ===== 日期工具 =====
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dateToStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDateCN(str) {
  var p = str.split('-');
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  var weeks = ['日','一','二','三','四','五','六'];
  return +p[0] + '年' + +p[1] + '月' + +p[2] + '日 星期' + weeks[d.getDay()];
}
function prevDateStr(dateStr) {
  var p = dateStr.split('-');
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  d.setDate(d.getDate() - 1);
  return dateToStr(d);
}

// ===== 初始化当天数据（含遗留逻辑）=====
function ensureDayData(dateStr) {
  var data = getDayData(dateStr);
  if (!data) {
    data = { fixed: {}, flex: [], carry: [], removedFixed: [] };
  }
  if (!data.removedFixed) data.removedFixed = [];
  if (!data.carry) data.carry = [];

  // 同步固定项目
  var routines = getRoutines();
  routines.forEach(function(r) {
    if (r.createdDate <= dateStr) {
      if (!(r.id in data.fixed) && data.removedFixed.indexOf(r.id) === -1) {
        data.fixed[r.id] = false;
      }
    }
  });

  // 遗留逻辑：从前一天拉未完成的flex和carry
  var today = todayStr();
  if (dateStr === today && data.carry.length === 0) {
    var prevDate = prevDateStr(dateStr);
    var prevData = getDayData(prevDate);
    if (prevData) {
      var carryItems = [];
      // 前一天的flex未完成
      if (prevData.flex) {
        prevData.flex.forEach(function(f) {
          if (!f.done) {
            carryItems.push({ id: f.id + '_c', text: f.text, done: false, from: prevDate });
          }
        });
      }
      // 前一天的carry未完成（继续传递）
      if (prevData.carry) {
        prevData.carry.forEach(function(c) {
          if (!c.done) {
            carryItems.push({ id: c.id + '_c', text: c.text, done: false, from: c.from || prevDate });
          }
        });
      }
      if (carryItems.length > 0) {
        data.carry = carryItems;
      }
    }
  }

  saveDayData(dateStr, data);
  return data;
}

// ===== 获取某天完成状态 =====
function getDayStatus(dateStr) {
  var data = getDayData(dateStr);
  if (!data) {
    var routines = getRoutines();
    var hasRoutine = false;
    routines.forEach(function(r) {
      if (r.createdDate <= dateStr) hasRoutine = true;
    });
    if (!hasRoutine) return { total: 0, done: 0 };
    data = ensureDayData(dateStr);
  }
  var total = 0, done = 0;
  var fixedKeys = Object.keys(data.fixed);
  total += fixedKeys.length;
  fixedKeys.forEach(function(k) { if (data.fixed[k]) done++; });
  if (data.flex) {
    total += data.flex.length;
    data.flex.forEach(function(f) { if (f.done) done++; });
  }
  if (data.carry) {
    total += data.carry.length;
    data.carry.forEach(function(c) { if (c.done) done++; });
  }
  return { total: total, done: done };
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = calYear + '年' + calMonth + '月';
  var grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  var firstDay = new Date(calYear, calMonth - 1, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth, 0).getDate();
  var today = todayStr();
  var doneDays = 0, taskDays = 0;

  for (var i = 0; i < firstDay; i++) {
    var empty = document.createElement('div');
    empty.className = 'dc empty';
    grid.appendChild(empty);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var ds = calYear + '-' + String(calMonth).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var cell = document.createElement('button');
    cell.className = 'dc';
    cell.textContent = d;

    if (ds === today) cell.classList.add('today');
    if (ds > today) {
      cell.classList.add('future');
    } else {
      var st = getDayStatus(ds);
      if (st.total > 0) {
        taskDays++;
        if (st.done === st.total) {
          cell.classList.add('completed');
          doneDays++;
        } else {
          cell.classList.add('has-tasks');
        }
      }
    }

    cell.onclick = (function(date) {
      return function() { goToDate(date); };
    })(ds);
    grid.appendChild(cell);
  }

  document.getElementById('statDone').textContent = doneDays;
  document.getElementById('statTotal').textContent = taskDays;
  document.getElementById('statRate').textContent = taskDays > 0 ? Math.round(doneDays/taskDays*100) + '%' : '0%';

  renderMonthPlan();
}

function updateProgress(data) {
  var total = 0, done = 0;
  var fixedKeys = Object.keys(data.fixed);
  total += fixedKeys.length;
  fixedKeys.forEach(function(k) { if (data.fixed[k]) done++; });
  total += data.flex.length;
  data.flex.forEach(function(f) { if (f.done) done++; });
  if (data.carry) {
    total += data.carry.length;
    data.carry.forEach(function(c) { if (c.done) done++; });
  }

  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' 已完成';

function renderSleep() {

  var checkDate = new Date();
  if (!todayChecked) {
    checkDate.setDate(checkDate.getDate() - 1);

  while (true) {
    var ds = dateToStr(checkDate);

// ===== 猫咪桌宠 =====
var catMeowing = false;

function getCatState(data) {
  // 检查是否全部完成
  var total = 0, done = 0;
  var fixedKeys = Object.keys(data.fixed);
  total += fixedKeys.length;
  fixedKeys.forEach(function(k) { if (data.fixed[k]) done++; });
  total += data.flex.length;
  data.flex.forEach(function(f) { if (f.done) done++; });
  if (data.carry) {
    total += data.carry.length;
    data.carry.forEach(function(c) { if (c.done) done++; });
  }
  if (total > 0 && done === total) return 'complete';

  // 根据时间
  var hour = new Date().getHours();
  if (hour >= 6 && hour < 12) return 'morning';
  if (hour >= 12 && hour < 18) return 'afternoon';
  if (hour >= 18 && hour < 23) return 'evening';
  return 'night';
}

function updateCat(data) {
  if (catMeowing) return; // 喵叫中不打断

  var state = getCatState(data);
  var container = document.getElementById('catContainer');
  var body = document.getElementById('catBody');
  var bubble = document.getElementById('catBubble');

  // 清除所有动画class
  container.className = 'cat-container';

  switch(state) {
    case 'morning':
      body.textContent = '🐱';
      container.classList.add('cat-wave');
      bubble.textContent = '早上好~';
      break;
    case 'afternoon':
      body.textContent = '😺';
      container.classList.add('cat-sleep');
      bubble.textContent = '好困呀~';
      break;
    case 'evening':
      body.textContent = '🐱';
      container.classList.add('cat-type');
      bubble.textContent = '撸起袖子加油干！';
      break;
    case 'night':
      body.textContent = '😾';
      container.classList.add('cat-sleep');
      bubble.textContent = '该睡觉了~';
      break;
    case 'complete':
      body.textContent = '😸';
      container.classList.add('cat-jump');
      bubble.textContent = '太棒了！🎉';
      break;
  }
}

function catMeow() {
  catMeowing = true;
  var container = document.getElementById('catContainer');
  var body = document.getElementById('catBody');
  var bubble = document.getElementById('catBubble');

  container.className = 'cat-container cat-meow';
  body.textContent = '😺';
  bubble.textContent = '喵~';

  setTimeout(function() {
    catMeowing = false;
    var data = getDayData(currentDate);
    if (data) updateCat(data);
  }, 1200);
}

var lastCelebState = {};

function celebrate() {
  var key = currentDate;
  var data = getDayData(key);
  if (!data) return;

  var total = Object.keys(data.fixed).length + data.flex.length + (data.carry ? data.carry.length : 0);
  var done = 0;
  Object.keys(data.fixed).forEach(function(k) { if (data.fixed[k]) done++; });
  data.flex.forEach(function(f) { if (f.done) done++; });
  if (data.carry) data.carry.forEach(function(c) { if (c.done) done++; });

  var stateKey = key + '_' + total + '_' + done;
  if (lastCelebState[key] === stateKey) return;
  lastCelebState[key] = stateKey;

  // 撒花
  launchConfetti();

  // 猫咪跳跃
  var container = document.getElementById('catContainer');
  container.className = 'cat-container cat-jump';
  document.getElementById('catBody').textContent = '😸';
  document.getElementById('catBubble').textContent = '太棒了！🎉';

  // 文字
  var overlay = document.getElementById('celebOverlay');
  var text = document.getElementById('celebText');
  text.textContent = '🎉 全部完成！';
  overlay.classList.add('show');

  setTimeout(function() {
    overlay.classList.remove('show');
  }, 2500);
}

function launchConfetti() {
  var colors = ['#4CAF50','#FF9800','#2196F3','#E91E63','#FFEB3B','#9C27B0','#00BCD4'];
  var count = 60;

  for (var i = 0; i < count; i++) {
    (function(delay) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'conf';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-10px';
        el.style.width = (Math.random() * 8 + 6) + 'px';
        el.style.height = (Math.random() * 8 + 6) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.opacity = '1';
        document.body.appendChild(el);

        var x = (Math.random() - 0.5) * 200;
        var duration = Math.random() * 1500 + 1500;
        var startTime = Date.now();

        function fall() {
          var elapsed = Date.now() - startTime;
          var progress = elapsed / duration;
          if (progress >= 1) {
            el.remove();
            return;
          }
          var y = progress * window.innerHeight * 1.1;
          var wobble = Math.sin(progress * 10) * 20;
          el.style.transform = 'translate(' + (x * progress + wobble) + 'px, ' + y + 'px) rotate(' + (progress * 720) + 'deg)';
          el.style.opacity = progress > 0.7 ? String(1 - (progress - 0.7) / 0.3) : '1';
          requestAnimationFrame(fall);
        }
        requestAnimationFrame(fall);
      }, delay);
    })(Math.random() * 500);
  }
}

// ===== 初始化 =====
function init() {
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth() + 1;
  currentDate = todayStr();
  switchPage('today');
}

init();
